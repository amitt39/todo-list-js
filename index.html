<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TO-DO</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="input-button">
        <input
          type="text"
          name="task-input"
          id="task-input"
          placeholder="Enter Task"
        />
        <button id="add_task">+ Add Task</button>
      </div>
      <p class="errMsg"></p>
      <ul class="list-container">
        <p class="NoTaskMsg">No Task added yet!</p>
      </ul>
      <button class="delAll">Delet All</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
